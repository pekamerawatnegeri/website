<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction | PekaMerawatNegeri</title>
    <link rel="icon" href="assets/logosymbol.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1e293b;
            text-align: center;
        }

        .container {
            padding: 2rem;
            max-width: 600px;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 2.5rem;
        }

        .logo img {
            height: 60px;
            width: auto;
        }

        .logo span {
            font-weight: 800;
            font-size: 1.6rem;
            color: #2563eb;
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 1rem;
            color: #0f172a;
            letter-spacing: -0.02em;
        }

        p {
            font-size: 1.15rem;
            color: #64748b;
            line-height: 1.7;
            margin-bottom: 0;
        }

        .badge {
            background: #dbeafe;
            color: #2563eb;
            padding: 8px 20px;
            border-radius: 99px;
            font-weight: 600;
            font-size: 0.85rem;
            display: inline-block;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Pastikan path assets/logosymbol.webp sudah sesuai dengan folder kamu -->
        <div class="logo">
            <img src="assets/logosymbol.webp" alt="Logo PekaMerawatNegeri">
            <span>PekaMerawatNegeri.</span>
        </div>

        <div class="badge">Pemeliharaan Sistem</div>

        <h1>Sedang Kami <span style="color: #2563eb;">Siapkan.</span></h1>

        <p>
            Kami sedang menyempurnakan platform publikasi untuk para tenaga kesehatan Indonesia.
            Mohon tunggu sebentar lagi, kami akan segera kembali dengan fitur yang lebih lengkap.
        </p>
    </div>
</body>

</html>
